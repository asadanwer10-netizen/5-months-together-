<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 20px;
    max-width: 420px;
    margin: auto;
}

h1 {
    margin-top: 50px;
    font-size: 2.2em;
}

.typing {
    margin-top: 20px;
    font-size: 1.15em;
    min-height: 70px;
    line-height: 1.5;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    margin-top: 30px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
}

.counter {
    font-size: 1.6em;
    margin-top: 10px;
    font-weight: bold;
}

button {
    margin-top: 30px;
    padding: 14px 22px;
    border: none;
    border-radius: 25px;
    font-size: 1em;
    background: #ff4d6d;
    color: white;
}

button:active {
    transform: scale(0.95);
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <h1>❤️ Hey My Love ❤️</h1>

    <div class="typing" id="typingText"></div>

    <div class="card">
        <h2>💖 Our Journey</h2>
        <p>We’ve been together for</p>
        <div class="counter" id="daysCounter"></div>
        <p>From 17 November 2025 till forever ♾️</p>
    </div>

    <button onclick="showMessage()">Tap Me 💌</button>

</div>

<script>
/* ❤️ Typing Effect */
const text = "These 5 months with you have been the most beautiful time of my life. Every smile, every moment, every memory with you means everything to me. I love you more than words can ever express ❤️";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typingText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 35);
    }
}
typeEffect();

/* 💌 Button Message */
function showMessage() {
    alert("You are my today, my tomorrow, and my forever ❤️");
}

/* ⏳ Days Counter */
const startDate = new Date("2025-11-17");
const today = new Date();
const diffTime = today - startDate;
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

document.getElementById("daysCounter").innerText = days + " days ❤️";

/* 💖 Floating Hearts */
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
